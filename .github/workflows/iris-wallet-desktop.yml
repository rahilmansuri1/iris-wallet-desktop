name: Iris Wallet Desktop CI

on:
  push:
    tags:
      - '*'  # Trigger workflow when a new tag is pushed.

jobs:
  build-linux:
    name: Build and Package Iris Wallet for Linux
    runs-on: ubuntu-22.04
    steps:
      # Step 1: Check out code repository, including submodules
      - name: Checkout code with submodules
        uses: actions/checkout@v3
        with:
          submodules: true
          fetch-depth: 1
          submodule-fetch-depth: 1  # Fetch minimal depth for submodules to reduce build time.

      # Step 2: Install Rust programming language
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          source "$HOME/.cargo/env"

      # Step 3: Set up Python environment
      - name: Set up Python 3.12.3
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.3"

      # Step 4: Install system dependencies required for building the project
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install libxcb-cursor0 libfuse2 -y
          sudo apt install ruby-dev build-essential && sudo gem install fpm -f

      # Step 5: Clone the rgb-lightning-node repository with submodules
      - name: Clone rgb-lightning-node repository
        run: git clone https://github.com/RGB-Tools/rgb-lightning-node --recurse-submodules --shallow-submodules

      # Step 6: Build the rgb-lightning-node binary
      - name: Build the rgb-lightning-node binary
        working-directory: rgb-lightning-node
        run: cargo install --locked --debug --path .

      # Step 7: Copy the rgb-lightning-node binary to the root directory
      - name: Copy rgb-lightning-node binary
        run: |
          mkdir ln_node_binary
          cp rgb-lightning-node/target/debug/rgb-lightning-node ln_node_binary/

      # Step 8: Create a configuration file from environment variables
      - name: Set environment variables and create config.py
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          AUTH_URI: ${{ secrets.AUTH_URI }}
          TOKEN_URI: ${{ secrets.TOKEN_URI }}
          AUTH_PROVIDER_CERT_URL: ${{ secrets.AUTH_PROVIDER_CERT_URL }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          EMAIL_ID: ${{ secrets.EMAIL_ID }}
          EMAIL_TOKEN: ${{ secrets.EMAIL_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          cd src/utils
          python generate_config.py

      # Step 9: Install Python dependencies
      - name: Install Python dependencies
        run: |
          pip install poetry pyinstaller
          poetry install

      # Step 10: Compile PySide6 Qt resources
      - name: Compile PySide6 Qt resources
        run: poetry run pyside6-rcc src/resources.qrc -o src/resources_rc.py

      # Step 11: Build and rename AppImage for regtest
      - name: Create AppImage for regtest
        run: |
          ARCH=$(uname -m)
          VERSION=$(grep '__version__' src/version.py | cut -d "'" -f 2)
          poetry run build-iris-wallet --network=regtest --distribution=appimage
          REGTEST_APPIMAGE_NAME="iriswallet-${VERSION}-${ARCH}.AppImage"
          RENAME_REGTEST_APPIMAGE_NAME="iriswallet-regtest-${VERSION}-${ARCH}.AppImage"
          mv ${REGTEST_APPIMAGE_NAME} ${RENAME_REGTEST_APPIMAGE_NAME}
          echo "RENAME_REGTEST_APPIMAGE_NAME=${RENAME_REGTEST_APPIMAGE_NAME}" >> $GITHUB_ENV

      # Step 12: Upload regtest AppImage artifact
      - name: Upload regtest AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux_appimage_regtest
          path: ${{ env.RENAME_REGTEST_APPIMAGE_NAME }}

      # Step 13: Build and rename AppImage for testnet
      - name: Create AppImage for testnet
        run: |
          ARCH=$(uname -m)
          VERSION=$(grep '__version__' src/version.py | cut -d "'" -f 2)
          poetry run build-iris-wallet --network=testnet --distribution=appimage
          TESTNET_APPIMAGE_NAME="iriswallet-${VERSION}-${ARCH}.AppImage"
          RENAME_TESTNET_APPIMAGE_NAME="iriswallet-testnet-${VERSION}-${ARCH}.AppImage"
          mv ${TESTNET_APPIMAGE_NAME} ${RENAME_TESTNET_APPIMAGE_NAME}
          echo "RENAME_TESTNET_APPIMAGE_NAME=${RENAME_TESTNET_APPIMAGE_NAME}" >> $GITHUB_ENV

      # Step 14: Upload testnet AppImage artifact
      - name: Upload testnet AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux_appimage_testnet
          path: ${{ env.RENAME_TESTNET_APPIMAGE_NAME }}

  upload-release:
    name: Create GitHub Release and Upload Artifacts
    if: needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    needs: build-linux
    permissions:
      contents: write
    steps:
      # Step 1: Checkout codebase
      - uses: actions/checkout@v3

      # Step 2: Get the tag name
      - name: Get tag name
        run: |
          TAG_NAME=$(git describe --tags)
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_ENV

      # Step 3: Create a GitHub Release
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "${{ env.TAG_NAME }}"
          release_name: "${{ env.TAG_NAME }}"
          draft: false
          prerelease: false

      # Step 4: Download and upload regtest AppImage
      - name: Upload regtest artifact to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: uploads/regtest/${{ env.RENAME_REGTEST_APPIMAGE_NAME }}
          asset_name: regtest-${{ env.TAG_NAME }}.AppImage
          asset_content_type: application/octet-stream

      # Step 5: Download and upload testnet AppImage
      - name: Upload testnet artifact to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: uploads/testnet/${{ env.RENAME_TESTNET_APPIMAGE_NAME }}
          asset_name: testnet-${{ env.TAG_NAME }}.AppImage
          asset_content_type: application/octet-stream

  cleanup:
    name: Cleanup Artifacts
    if: always()
    runs-on: ubuntu-latest
    needs: [build-linux, upload-release]
    steps:
      # Step 1: Remove leftover artifacts
      - name: Cleanup Artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            linux_appimage_regtest
            linux_appimage_testnet
          failOnError: false
